name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image in ACR
        run: |
          az acr build \
            --registry neuroguardianacr \
            --image neuroguardian-backend:${{ github.sha }} \
            --image neuroguardian-backend:latest \
            .

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name neuroguardian-backend \
            --resource-group neuroguardian-rg \
            --image neuroguardianacr.azurecr.io/neuroguardian-backend:${{ github.sha }}
